<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BarberFlow — Profissionais</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <div id="app-layout"></div>

  <!-- Modal Profissional -->
  <div id="modal" class="modal-overlay">
    <div class="modal-box">
      <div class="flex items-center justify-between mb-6">
        <h3 id="modal-title" class="text-lg font-semibold text-white">Novo Profissional</h3>
        <button type="button" onclick="closeModal()" class="text-gray-500 hover:text-white text-2xl leading-none">&times;</button>
      </div>
      <form id="modal-form" onsubmit="saveBarber(event)" class="space-y-4">
        <input type="hidden" id="edit-id" />
        <div>
          <label class="block text-xs text-gray-400 mb-1.5 uppercase tracking-wide">Nome *</label>
          <input type="text" id="f-name" required placeholder="Nome do profissional" class="input-field" />
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-xs text-gray-400 mb-1.5 uppercase tracking-wide">Telefone</label>
            <input type="tel" id="f-phone" placeholder="(11) 99999-9999" class="input-field" />
          </div>
          <div>
            <label class="block text-xs text-gray-400 mb-1.5 uppercase tracking-wide">Especialidade</label>
            <input type="text" id="f-specialty" placeholder="Ex: Corte, Barba" class="input-field" />
          </div>
        </div>
        <div class="flex gap-3 pt-2">
          <button type="submit" class="btn-gold flex-1 py-2.5">Salvar</button>
          <button type="button" onclick="closeModal()" class="btn-ghost px-6">Cancelar</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Modal Agenda -->
  <div id="modal-schedule" class="modal-overlay">
    <div class="modal-box" style="max-width:560px;">
      <div class="flex items-center justify-between mb-2">
        <h3 class="text-lg font-semibold text-white">Horários de Trabalho</h3>
        <button type="button" onclick="closeScheduleModal()" class="text-gray-500 hover:text-white text-2xl leading-none">&times;</button>
      </div>
      <p id="schedule-barber-name" class="text-amber-400 text-sm mb-5"></p>

      <div class="space-y-2" id="schedule-days"></div>

      <div class="flex gap-3 pt-5">
        <button onclick="saveSchedule()" class="btn-gold flex-1 py-2.5">Salvar Agenda</button>
        <button type="button" onclick="closeScheduleModal()" class="btn-ghost px-6">Cancelar</button>
      </div>
    </div>
  </div>

  <script src="../js/api.js"></script>
  <script src="../js/layout.js"></script>
  <script>
    initLayout('profissionais');

    const DAYS = ['Segunda','Terça','Quarta','Quinta','Sexta','Sábado','Domingo'];
    let currentBarberId = null;

    function renderPage() {
      document.getElementById('page-content').innerHTML = `
        <div class="fade-in">
          <div class="flex items-center justify-between mb-6">
            <div>
              <h1 class="font-display text-4xl tracking-wider gold">PROFISSIONAIS</h1>
              <p class="text-gray-500 text-sm mt-1">Equipe da barbearia</p>
            </div>
            <button onclick="openModal()" class="btn-gold flex items-center gap-2 px-5 py-2.5">
              <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
              </svg>
              Novo Profissional
            </button>
          </div>
          <div id="barbers-grid" class="grid grid-cols-1 gap-4" style="grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));">
            <div class="col-span-full text-center py-14 text-gray-500 text-sm">Carregando...</div>
          </div>
        </div>`;
      loadBarbers();
    }

    async function loadBarbers() {
      const grid = document.getElementById('barbers-grid');
      try {
        const barbers = await API.getBarbers();
        if (!barbers.length) {
          grid.innerHTML = `
            <div class="col-span-full text-center py-20 text-gray-600">
              <p class="text-sm mb-4">Nenhum profissional cadastrado</p>
              <button onclick="openModal()" class="btn-gold text-xs px-5 py-2">Adicionar profissional</button>
            </div>`;
          return;
        }
        const colors = ['#C9A84C','#34d399','#a5b4fc','#fb923c','#f472b6'];
        grid.innerHTML = barbers.map(b => {
          const color = colors[b.id % colors.length];
          return `
            <div class="card p-5 fade-in">
              <div class="flex items-start justify-between mb-4">
                <div class="w-12 h-12 rounded-xl flex items-center justify-center text-xl font-bold flex-shrink-0"
                     style="background:${color}20; color:${color}; font-family:'Bebas Neue',cursive;">
                  ${b.name.charAt(0).toUpperCase()}
                </div>
                <div class="flex gap-1">
                  <button onclick='openScheduleModal(${b.id}, "${b.name.replace(/"/g,"&quot;")}")'
                          class="text-gray-500 hover:text-amber-400 transition-colors p-1.5" title="Configurar agenda">
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                    </svg>
                  </button>
                  <button onclick='editBarber(${JSON.stringify(b).replace(/'/g,"&#39;")})'
                          class="text-gray-500 hover:text-white transition-colors p-1.5" title="Editar">
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                    </svg>
                  </button>
                  <button onclick="deleteBarber(${b.id})"
                          class="text-gray-500 hover:text-red-400 transition-colors p-1.5" title="Desativar">
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728A9 9 0 015.636 5.636m12.728 12.728L5.636 5.636"/>
                    </svg>
                  </button>
                </div>
              </div>
              <h3 class="text-white font-semibold text-base mb-1">${b.name}</h3>
              ${b.specialty ? `<p class="text-xs text-gray-400 mb-2">${b.specialty}</p>` : '<p class="mb-2"></p>'}
              ${b.phone ? `<p class="text-xs text-gray-500">${b.phone}</p>` : ''}
            </div>`;
        }).join('');
      } catch(e) {
        grid.innerHTML = `<div class="col-span-full text-center py-10 text-red-400">${e.message}</div>`;
      }
    }

    // ── Modal Profissional ──
    function openModal(data) {
      document.getElementById('modal-title').textContent = data ? 'Editar Profissional' : 'Novo Profissional';
      document.getElementById('edit-id').value     = data ? data.id : '';
      document.getElementById('f-name').value      = data ? data.name : '';
      document.getElementById('f-phone').value     = data ? (data.phone || '') : '';
      document.getElementById('f-specialty').value = data ? (data.specialty || '') : '';
      document.getElementById('modal').classList.add('show');
    }
    function editBarber(b) { openModal(b); }
    function closeModal() {
      document.getElementById('modal').classList.remove('show');
      document.getElementById('modal-form').reset();
      document.getElementById('edit-id').value = '';
    }
    async function saveBarber(e) {
      e.preventDefault();
      const id = document.getElementById('edit-id').value;
      const body = {
        name:      document.getElementById('f-name').value,
        phone:     document.getElementById('f-phone').value || null,
        specialty: document.getElementById('f-specialty').value || null,
      };
      try {
        if (id) { await API.updateBarber(id, body); showToast('Profissional atualizado!'); }
        else    { await API.createBarber(body);      showToast('Profissional cadastrado!'); }
        closeModal(); loadBarbers();
      } catch(err) { showToast(err.message, 'error'); }
    }
    async function deleteBarber(id) {
      if (!confirm('Desativar este profissional?')) return;
      try { await API.deleteBarber(id); showToast('Desativado', 'info'); loadBarbers(); }
      catch(err) { showToast(err.message, 'error'); }
    }

    // ── Modal Agenda ──
    async function openScheduleModal(barberId, barberName) {
      currentBarberId = barberId;
      document.getElementById('schedule-barber-name').textContent = barberName;

      // Busca agenda atual
      let existingSchedules = [];
      try {
        existingSchedules = await API.getSchedule(barberId);
      } catch(e) {}

      // Monta objeto por dia
      const byDay = {};
      existingSchedules.forEach(s => { byDay[s.day_of_week] = s; });

      // Renderiza os 7 dias com suporte a intervalos
      document.getElementById('schedule-days').innerHTML = DAYS.map((day, i) => {
        const e       = byDay[i];
        const checked = e ? 'checked' : '';
        const start   = e ? e.start_time : '08:00';
        const end     = e ? e.end_time   : '18:00';
        const b1s     = e && e.break1_start ? e.break1_start : '12:00';
        const b1e     = e && e.break1_end   ? e.break1_end   : '13:00';
        const b2s     = e && e.break2_start ? e.break2_start : '15:30';
        const b2e     = e && e.break2_end   ? e.break2_end   : '15:50';
        const hasB1   = e && e.break1_start && e.break1_end;
        const hasB2   = e && e.break2_start && e.break2_end;
        const active  = e ? '' : 'opacity-30 pointer-events-none';
        return `
          <div class="p-3 rounded-xl space-y-2" style="background:#1a1a1a;">
            <div class="flex items-center gap-3 schedule-day">
              <label class="flex items-center gap-2 cursor-pointer" style="min-width:110px;">
                <input type="checkbox" id="day-${i}" ${checked}
                       onchange="toggleDay(${i})"
                       class="w-4 h-4 rounded accent-amber-400" />
                <span class="text-sm font-medium ${e ? 'text-white' : 'text-gray-500'}" id="day-label-${i}">${day}</span>
              </label>
              <div id="day-times-${i}" class="flex items-center gap-2 schedule-times ${active}">
                <input type="time" id="start-${i}" value="${start}" class="input-field text-sm py-1.5" style="width:100px;" />
                <span class="text-gray-500 text-xs">até</span>
                <input type="time" id="end-${i}" value="${end}" class="input-field text-sm py-1.5" style="width:100px;" />
              </div>
            </div>
            <div id="day-breaks-${i}" class="${active} pl-2 space-y-1.5">
              <div class="flex items-center gap-2">
                <label class="flex items-center gap-1.5 cursor-pointer" style="min-width:110px;">
                  <input type="checkbox" id="b1-${i}" ${hasB1 ? 'checked' : ''}
                         onchange="toggleBreak(${i},1)"
                         class="w-3.5 h-3.5 accent-amber-400" />
                  <span class="text-xs text-gray-400">🍽 Almoço</span>
                </label>
                <div id="b1-times-${i}" class="flex items-center gap-1 ${hasB1 ? '' : 'opacity-30 pointer-events-none'}">
                  <input type="time" id="b1s-${i}" value="${b1s}" class="input-field text-xs py-1" style="width:105px;" />
                  <span class="text-gray-600 text-xs">–</span>
                  <input type="time" id="b1e-${i}" value="${b1e}" class="input-field text-xs py-1" style="width:105px;" />
                </div>
              </div>
              <div class="flex items-center gap-2">
                <label class="flex items-center gap-1.5 cursor-pointer" style="min-width:110px;">
                  <input type="checkbox" id="b2-${i}" ${hasB2 ? 'checked' : ''}
                         onchange="toggleBreak(${i},2)"
                         class="w-3.5 h-3.5 accent-amber-400" />
                  <span class="text-xs text-gray-400">☕ Intervalo</span>
                </label>
                <div id="b2-times-${i}" class="flex items-center gap-1 ${hasB2 ? '' : 'opacity-30 pointer-events-none'}">
                  <input type="time" id="b2s-${i}" value="${b2s}" class="input-field text-xs py-1" style="width:105px;" />
                  <span class="text-gray-600 text-xs">–</span>
                  <input type="time" id="b2e-${i}" value="${b2e}" class="input-field text-xs py-1" style="width:105px;" />
                </div>
              </div>
            </div>
          </div>`;
      }).join('');

      document.getElementById('modal-schedule').classList.add('show');
    }

    function toggleDay(i) {
      const checked = document.getElementById(`day-${i}`).checked;
      ['day-times-', 'day-breaks-'].forEach(prefix => {
        const el = document.getElementById(`${prefix}${i}`);
        if (el) {
          el.classList.toggle('opacity-30', !checked);
          el.classList.toggle('pointer-events-none', !checked);
        }
      });
      const label = document.getElementById(`day-label-${i}`);
      label.classList.toggle('text-white', checked);
      label.classList.toggle('text-gray-500', !checked);
    }

    function toggleBreak(i, n) {
      const checked = document.getElementById(`b${n}-${i}`).checked;
      const el = document.getElementById(`b${n}-times-${i}`);
      el.classList.toggle('opacity-30', !checked);
      el.classList.toggle('pointer-events-none', !checked);
    }

    function closeScheduleModal() {
      document.getElementById('modal-schedule').classList.remove('show');
      currentBarberId = null;
    }

    async function saveSchedule() {
      if (!currentBarberId) return;
      const schedules = [];
      for (let i = 0; i < 7; i++) {
        const checked = document.getElementById(`day-${i}`)?.checked;
        if (checked) {
          const hasB1 = document.getElementById(`b1-${i}`)?.checked;
          const hasB2 = document.getElementById(`b2-${i}`)?.checked;
          schedules.push({
            day_of_week:  i,
            start_time:   document.getElementById(`start-${i}`).value,
            end_time:     document.getElementById(`end-${i}`).value,
            break1_start: hasB1 ? document.getElementById(`b1s-${i}`).value : null,
            break1_end:   hasB1 ? document.getElementById(`b1e-${i}`).value : null,
            break2_start: hasB2 ? document.getElementById(`b2s-${i}`).value : null,
            break2_end:   hasB2 ? document.getElementById(`b2e-${i}`).value : null,
          });
        }
      }
      if (!schedules.length) {
        showToast('Selecione pelo menos um dia de trabalho', 'error');
        return;
      }
      try {
        await API.saveSchedule(currentBarberId, schedules);
        showToast('Agenda salva com sucesso!');
        closeScheduleModal();
      } catch(err) { showToast(err.message, 'error'); }
    }

    renderPage();
  </script>
</body>
</html>
