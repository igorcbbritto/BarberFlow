<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BarberFlow — Profissionais</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <div id="app-layout"></div>

  <!-- Modal -->
  <div id="modal" class="modal-overlay hidden">
    <div class="modal-box">
      <div class="flex items-center justify-between mb-6">
        <h3 id="modal-title" class="text-lg font-semibold text-white">Novo Profissional</h3>
        <button type="button" onclick="closeModal()" class="text-gray-500 hover:text-white text-xl leading-none">&times;</button>
      </div>
      <form id="modal-form" onsubmit="saveBarber(event)" class="space-y-4">
        <input type="hidden" id="edit-id" />
        <div>
          <label class="block text-xs text-gray-400 mb-1.5 uppercase tracking-wide">Nome *</label>
          <input type="text" id="f-name" required placeholder="Nome do profissional" class="input-field" />
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-xs text-gray-400 mb-1.5 uppercase tracking-wide">Telefone</label>
            <input type="tel" id="f-phone" placeholder="(11) 99999-9999" class="input-field" />
          </div>
          <div>
            <label class="block text-xs text-gray-400 mb-1.5 uppercase tracking-wide">Especialidade</label>
            <input type="text" id="f-specialty" placeholder="Ex: Corte, Barba" class="input-field" />
          </div>
        </div>
        <div class="flex gap-3 pt-2">
          <button type="submit" class="btn-gold flex-1 py-2.5">Salvar</button>
          <button type="button" onclick="closeModal()" class="btn-ghost px-6">Cancelar</button>
        </div>
      </form>
    </div>
  </div>

  <script src="../js/api.js"></script>
  <script src="../js/layout.js"></script>
  <script>
    initLayout('profissionais');

    function renderPage() {
      const content = document.getElementById('page-content');
      content.innerHTML = `
        <div class="fade-in">
          <div class="flex items-center justify-between mb-6">
            <div>
              <h1 class="font-display text-4xl tracking-wider gold">PROFISSIONAIS</h1>
              <p class="text-gray-500 text-sm mt-1">Equipe da barbearia</p>
            </div>
            <button onclick="openModal()" class="btn-gold flex items-center gap-2 px-5 py-2.5">
              <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
              </svg>
              Novo Profissional
            </button>
          </div>
          <div id="barbers-grid" class="grid grid-cols-3 gap-5">
            <div class="col-span-3 text-center py-14 text-gray-500 text-sm">Carregando...</div>
          </div>
        </div>`;
      loadBarbers();
    }

    async function loadBarbers() {
      const grid = document.getElementById('barbers-grid');
      try {
        const barbers = await API.getBarbers();
        if (!barbers.length) {
          grid.innerHTML = `
            <div class="col-span-3 text-center py-20 text-gray-600">
              <p class="text-sm mb-4">Nenhum profissional cadastrado</p>
              <button onclick="openModal()" class="btn-gold text-xs px-5 py-2">Adicionar profissional</button>
            </div>`;
          return;
        }
        grid.innerHTML = barbers.map(b => {
          const initial = b.name.charAt(0).toUpperCase();
          const colors  = ['#C9A84C','#34d399','#a5b4fc','#fb923c','#f472b6'];
          const color   = colors[b.id % colors.length];
          return `
            <div class="card p-6 fade-in">
              <div class="flex items-start justify-between mb-4">
                <div class="w-14 h-14 rounded-2xl flex items-center justify-center text-xl font-bold"
                     style="background:${color}20; color:${color}; font-family:'Bebas Neue',cursive;">
                  ${initial}
                </div>
                <div class="flex gap-2">
                  <button onclick='editBarber(${JSON.stringify(b)})'
                          class="text-gray-500 hover:text-white transition-colors p-1.5" title="Editar">
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                    </svg>
                  </button>
                  <button onclick="deleteBarber(${b.id})"
                          class="text-gray-500 hover:text-red-400 transition-colors p-1.5" title="Desativar">
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728A9 9 0 015.636 5.636m12.728 12.728L5.636 5.636"/>
                    </svg>
                  </button>
                </div>
              </div>
              <h3 class="text-white font-semibold text-base mb-1">${b.name}</h3>
              ${b.specialty ? `<p class="text-xs text-gray-400 mb-3">${b.specialty}</p>` : '<p class="mb-3"></p>'}
              ${b.phone ? `<div class="text-xs text-gray-500">${b.phone}</div>` : ''}
            </div>`;
        }).join('');
      } catch(e) {
        grid.innerHTML = `<div class="col-span-3 text-center py-10 text-red-400">${e.message}</div>`;
      }
    }

    function openModal(data) {
      document.getElementById('modal-title').textContent = data ? 'Editar Profissional' : 'Novo Profissional';
      document.getElementById('edit-id').value     = data ? data.id : '';
      document.getElementById('f-name').value      = data ? data.name : '';
      document.getElementById('f-phone').value     = data ? (data.phone || '') : '';
      document.getElementById('f-specialty').value = data ? (data.specialty || '') : '';
      document.getElementById('modal').classList.remove('hidden');
    }

    function editBarber(b) { openModal(b); }

    function closeModal() {
      document.getElementById('modal').classList.add('hidden');
      document.getElementById('modal-form').reset();
      document.getElementById('edit-id').value = '';
    }

    async function saveBarber(e) {
      e.preventDefault();
      const id = document.getElementById('edit-id').value;
      const body = {
        name:      document.getElementById('f-name').value,
        phone:     document.getElementById('f-phone').value || null,
        specialty: document.getElementById('f-specialty').value || null,
      };
      try {
        if (id) { await API.updateBarber(id, body); showToast('Profissional atualizado!'); }
        else    { await API.createBarber(body);      showToast('Profissional cadastrado!'); }
        closeModal();
        loadBarbers();
      } catch(err) { showToast(err.message, 'error'); }
    }

    async function deleteBarber(id) {
      if (!confirm('Desativar este profissional?')) return;
      try {
        await API.deleteBarber(id);
        showToast('Profissional desativado', 'info');
        loadBarbers();
      } catch(err) { showToast(err.message, 'error'); }
    }

    renderPage();
  </script>
</body>
</html>
