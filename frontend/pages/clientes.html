<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BarberFlow — Clientes</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <div id="app-layout"></div>

  <!-- Modal -->
  <div id="modal" class="modal-overlay hidden" onclick="closeModalOutside(event)">
    <div class="modal-box">
      <div class="flex items-center justify-between mb-6">
        <h3 id="modal-title" class="text-lg font-semibold text-white">Novo Cliente</h3>
        <button onclick="closeModal()" class="text-gray-500 hover:text-white">✕</button>
      </div>
      <form id="modal-form" onsubmit="saveClient(event)" class="space-y-4">
        <input type="hidden" id="edit-id" />
        <div>
          <label class="block text-xs text-gray-400 mb-1.5 uppercase tracking-wide">Nome *</label>
          <input type="text" id="f-name" required placeholder="Nome completo" class="input-field" />
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-xs text-gray-400 mb-1.5 uppercase tracking-wide">Telefone</label>
            <input type="tel" id="f-phone" placeholder="(11) 99999-9999" class="input-field" />
          </div>
          <div>
            <label class="block text-xs text-gray-400 mb-1.5 uppercase tracking-wide">E-mail</label>
            <input type="email" id="f-email" placeholder="cliente@email.com" class="input-field" />
          </div>
        </div>
        <div>
          <label class="block text-xs text-gray-400 mb-1.5 uppercase tracking-wide">Observações</label>
          <textarea id="f-notes" rows="2" placeholder="Ex: prefere horário pela manhã..." class="input-field resize-none"></textarea>
        </div>
        <div class="flex gap-3 pt-2">
          <button type="submit" class="btn-gold flex-1 py-2.5">Salvar</button>
          <button type="button" onclick="closeModal()" class="btn-ghost px-6">Cancelar</button>
        </div>
      </form>
    </div>
  </div>

  <script src="../js/api.js"></script>
  <script src="../js/layout.js"></script>
  <script>
    initLayout('clientes');
    let searchTimeout;

    function renderPage() {
      const content = document.getElementById('page-content');
      content.innerHTML = `
        <div class="fade-in">
          <div class="flex items-center justify-between mb-6">
            <div>
              <h1 class="font-display text-4xl tracking-wider gold">CLIENTES</h1>
              <p class="text-gray-500 text-sm mt-1">Gerencie sua base de clientes</p>
            </div>
            <button onclick="openModal()" class="btn-gold flex items-center gap-2 px-5 py-2.5">
              <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
              </svg>
              Novo Cliente
            </button>
          </div>

          <!-- Busca -->
          <div class="card p-4 mb-5">
            <div class="relative">
              <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-500"
                   fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0"/>
              </svg>
              <input type="text" id="search-input" placeholder="Buscar por nome ou telefone..."
                     oninput="onSearch(this.value)"
                     class="input-field pl-9" />
            </div>
          </div>

          <!-- Lista -->
          <div class="card overflow-hidden" id="clients-table">
            <div class="flex items-center justify-center h-24 text-gray-500 text-sm">Carregando...</div>
          </div>
        </div>`;

      loadClients();
    }

    async function loadClients(search = '') {
      const table = document.getElementById('clients-table');
      if (!table) return;
      try {
        const clients = await API.getClients(search);
        renderTable(clients);
      } catch(e) {
        table.innerHTML = `<div class="text-center py-10 text-red-400">${e.message}</div>`;
      }
    }

    function renderTable(clients) {
      const table = document.getElementById('clients-table');
      if (!clients.length) {
        table.innerHTML = `
          <div class="text-center py-16 text-gray-600">
            <svg class="w-10 h-10 mx-auto mb-3 opacity-30" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                    d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/>
            </svg>
            <p class="text-sm">Nenhum cliente encontrado</p>
            <button onclick="openModal()" class="btn-gold text-xs px-4 py-2 mt-4">Cadastrar primeiro cliente</button>
          </div>`;
        return;
      }

      table.innerHTML = `
        <div class="grid gap-4 px-5 py-3 text-xs text-gray-500 uppercase tracking-wider border-b"
             style="grid-template-columns: 1fr 150px 200px 1fr 80px; border-color:#1a1a1a;">
          <div>Nome</div><div>Telefone</div><div>E-mail</div><div>Observações</div><div>Ações</div>
        </div>
        ${clients.map(c => `
          <div class="table-row grid gap-4 px-5 py-4 items-center"
               style="grid-template-columns: 1fr 150px 200px 1fr 80px;">
            <div>
              <div class="font-medium text-white text-sm">${c.name}</div>
              <div class="text-gray-500 text-xs mt-0.5">desde ${formatDate(c.created_at)}</div>
            </div>
            <div class="text-gray-300 text-sm">${c.phone || '—'}</div>
            <div class="text-gray-400 text-sm truncate">${c.email || '—'}</div>
            <div class="text-gray-500 text-xs truncate">${c.notes || '—'}</div>
            <div class="flex gap-2">
              <button onclick='editClient(${JSON.stringify(c)})'
                      class="text-gray-400 hover:text-white transition-colors" title="Editar">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                </svg>
              </button>
              <button onclick="deleteClient(${c.id})"
                      class="text-gray-500 hover:text-red-400 transition-colors" title="Excluir">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                </svg>
              </button>
            </div>
          </div>`).join('')}`;
    }

    function onSearch(value) {
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(() => loadClients(value), 350);
    }

    function openModal(data = null) {
      document.getElementById('modal-title').textContent = data ? 'Editar Cliente' : 'Novo Cliente';
      document.getElementById('edit-id').value  = data?.id || '';
      document.getElementById('f-name').value   = data?.name || '';
      document.getElementById('f-phone').value  = data?.phone || '';
      document.getElementById('f-email').value  = data?.email || '';
      document.getElementById('f-notes').value  = data?.notes || '';
      document.getElementById('modal').classList.remove('hidden');
    }

    function editClient(c) { openModal(c); }
    function closeModal() { document.getElementById('modal').classList.add('hidden'); }
    function closeModalOutside(e) { if (e.target.id === 'modal') closeModal(); }

    async function saveClient(e) {
      e.preventDefault();
      const id = document.getElementById('edit-id').value;
      const body = {
        name:  document.getElementById('f-name').value,
        phone: document.getElementById('f-phone').value || null,
        email: document.getElementById('f-email').value || null,
        notes: document.getElementById('f-notes').value || null,
      };
      try {
        if (id) { await API.updateClient(id, body); showToast('Cliente atualizado!'); }
        else    { await API.createClient(body);      showToast('Cliente cadastrado!'); }
        closeModal();
        loadClients(document.getElementById('search-input')?.value || '');
      } catch(err) { showToast(err.message, 'error'); }
    }

    async function deleteClient(id) {
      if (!confirm('Excluir este cliente?')) return;
      try {
        await API.deleteClient(id);
        showToast('Cliente excluído', 'info');
        loadClients();
      } catch(err) { showToast(err.message, 'error'); }
    }

    renderPage();
  </script>
</body>
</html>
