<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BarberFlow — Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body { font-family: 'DM Sans', sans-serif; background: #0D0D0D; color: #e5e5e5; margin: 0; min-height: 100vh; }
    .font-display { font-family: 'Bebas Neue', cursive; }
    .gold { color: #C9A84C; }
    .card { background: #111; border: 1px solid #1e1e1e; border-radius: 16px; }
    .input-field { background: #1a1a1a; border: 1px solid #2a2a2a; color: #e5e5e5; border-radius: 10px; padding: 10px 14px; font-size: 14px; width: 100%; transition: border-color 0.2s; font-family: 'DM Sans', sans-serif; outline: none; }
    .input-field:focus { border-color: #C9A84C; }
    .input-field::placeholder { color: #444; }
    select.input-field option { background: #1a1a1a; }
    .btn-gold { background: #C9A84C; color: #0D0D0D; font-weight: 600; border: none; cursor: pointer; transition: all 0.2s; border-radius: 10px; padding: 10px 20px; font-size: 14px; font-family: 'DM Sans', sans-serif; display: inline-flex; align-items: center; gap: 6px; }
    .btn-gold:hover { background: #E8C97A; }
    .btn-ghost { background: transparent; color: #888; border: 1px solid #2a2a2a; cursor: pointer; border-radius: 10px; padding: 8px 14px; font-size: 13px; font-family: 'DM Sans', sans-serif; transition: all 0.2s; }
    .btn-ghost:hover { border-color: #444; color: #ccc; }
    .btn-danger { background: transparent; color: #f87171; border: 1px solid rgba(248,113,113,0.3); cursor: pointer; border-radius: 10px; padding: 8px 14px; font-size: 13px; font-family: 'DM Sans', sans-serif; transition: all 0.2s; }
    .btn-danger:hover { background: rgba(248,113,113,0.1); }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); display: none; align-items: center; justify-content: center; z-index: 100; padding: 16px; }
    .modal-overlay.show { display: flex; }
    .modal-box { background: #161616; border: 1px solid #2a2a2a; border-radius: 16px; padding: 28px; width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; }
    .badge-active   { background: rgba(16,185,129,0.15); color: #34d399; border: 1px solid rgba(16,185,129,0.2); padding: 2px 10px; border-radius: 999px; font-size: 11px; font-weight: 500; }
    .badge-expired  { background: rgba(239,68,68,0.15);  color: #f87171; border: 1px solid rgba(239,68,68,0.2);  padding: 2px 10px; border-radius: 999px; font-size: 11px; font-weight: 500; }
    .badge-inactive { background: rgba(107,114,128,0.15);color: #9ca3af; border: 1px solid rgba(107,114,128,0.2);padding: 2px 10px; border-radius: 999px; font-size: 11px; font-weight: 500; }
    .shop-card { background: #111; border: 1px solid #1e1e1e; border-radius: 14px; padding: 20px; transition: border-color 0.15s; }
    .shop-card:hover { border-color: #2a2a2a; }
    .toast { position: fixed; top: 20px; right: 20px; z-index: 200; padding: 12px 20px; border-radius: 10px; font-size: 14px; font-weight: 500; color: #fff; transition: opacity 0.3s; }
  </style>
</head>
<body>

  <!-- Header -->
  <header style="background:#111; border-bottom:1px solid #1e1e1e; padding: 14px 24px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:30;">
    <span class="font-display text-2xl tracking-widest gold">BARBERFLOW <span style="color:#333; font-size:14px; letter-spacing:0.05em;">ADMIN</span></span>
    <button onclick="logout()" class="btn-ghost text-sm">Sair</button>
  </header>

  <main style="max-width: 900px; margin: 0 auto; padding: 32px 16px;">

    <!-- Topo -->
    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:24px; flex-wrap:wrap; gap:12px;">
      <div>
        <h1 class="font-display" style="font-size:2.2rem; color:#C9A84C; margin:0;">BARBEARIAS</h1>
        <p style="color:#555; font-size:13px; margin:4px 0 0;">Gerencie os clientes do BarberFlow</p>
      </div>
      <button onclick="openModal()" class="btn-gold">
        <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
        Nova Barbearia
      </button>
    </div>

    <!-- Métricas -->
    <div id="metrics" style="display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:24px;"></div>

    <!-- Lista -->
    <div id="shops-list"><div style="text-align:center; padding:60px; color:#555;">Carregando...</div></div>

  </main>

  <!-- Modal Nova/Editar Barbearia -->
  <div id="modal" class="modal-overlay">
    <div class="modal-box">
      <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:20px;">
        <h3 id="modal-title" style="font-size:16px; font-weight:600; color:#fff; margin:0;">Nova Barbearia</h3>
        <button onclick="closeModal()" style="background:none;border:none;color:#666;font-size:22px;cursor:pointer;line-height:1;">&times;</button>
      </div>
      <div class="space-y-4" id="modal-form-fields" style="display:flex; flex-direction:column; gap:14px;">
        <input type="hidden" id="edit-id" />

        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
          <div>
            <label style="display:block; font-size:11px; color:#666; margin-bottom:6px; text-transform:uppercase; letter-spacing:0.05em;">Nome da barbearia *</label>
            <input type="text" id="f-name" placeholder="Ex: Barbearia do João" class="input-field" />
          </div>
          <div>
            <label style="display:block; font-size:11px; color:#666; margin-bottom:6px; text-transform:uppercase; letter-spacing:0.05em;">Slug (URL) *</label>
            <input type="text" id="f-slug" placeholder="joao-barber" class="input-field" oninput="this.value=this.value.toLowerCase().replace(/\s/g,'-')" />
          </div>
        </div>

        <div id="owner-fields">
          <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:10px;">
            <div>
              <label style="display:block; font-size:11px; color:#666; margin-bottom:6px; text-transform:uppercase; letter-spacing:0.05em;">Nome do dono *</label>
              <input type="text" id="f-owner-name" placeholder="João Silva" class="input-field" />
            </div>
            <div>
              <label style="display:block; font-size:11px; color:#666; margin-bottom:6px; text-transform:uppercase; letter-spacing:0.05em;">E-mail *</label>
              <input type="email" id="f-owner-email" placeholder="joao@email.com" class="input-field" />
            </div>
          </div>
          <div>
            <label style="display:block; font-size:11px; color:#666; margin-bottom:6px; text-transform:uppercase; letter-spacing:0.05em;">Senha de acesso *</label>
            <input type="text" id="f-owner-password" placeholder="Mínimo 6 caracteres" class="input-field" />
          </div>
        </div>

        <div>
          <label style="display:block; font-size:11px; color:#666; margin-bottom:6px; text-transform:uppercase; letter-spacing:0.05em;">Dias de acesso</label>
          <div style="display:flex; gap:8px; flex-wrap:wrap; margin-bottom:8px;" id="days-quick">
            <button type="button" onclick="setDays(7)"    class="btn-ghost" id="d7">7 dias</button>
            <button type="button" onclick="setDays(30)"   class="btn-ghost" id="d30">30 dias</button>
            <button type="button" onclick="setDays(90)"   class="btn-ghost" id="d90">90 dias</button>
            <button type="button" onclick="setDays(0)"    class="btn-ghost" id="d0"
                    style="border-color:#C9A84C; color:#C9A84C;">Vitalício</button>
          </div>
          <input type="number" id="f-access-days" value="30" min="1" class="input-field"
                 placeholder="Ou digite o número de dias (0 = vitalício)" />
          <p id="days-hint" style="font-size:11px; color:#555; margin-top:4px;"></p>
        </div>

        <div style="display:flex; gap:10px; padding-top:8px;">
          <button onclick="saveShop()" class="btn-gold" style="flex:1; justify-content:center;">Salvar</button>
          <button onclick="closeModal()" class="btn-ghost" style="padding:10px 20px;">Cancelar</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal Adicionar dias -->
  <div id="modal-days" class="modal-overlay">
    <div class="modal-box" style="max-width:360px;">
      <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:20px;">
        <h3 style="font-size:16px; font-weight:600; color:#fff; margin:0;">Adicionar dias de acesso</h3>
        <button onclick="closeDaysModal()" style="background:none;border:none;color:#666;font-size:22px;cursor:pointer;">&times;</button>
      </div>
      <p id="days-shop-name" style="color:#C9A84C; font-size:13px; margin-bottom:16px;"></p>
      <div style="display:flex; gap:8px; flex-wrap:wrap; margin-bottom:12px;">
        <button type="button" onclick="setAddDays(7)"  class="btn-ghost">+7 dias</button>
        <button type="button" onclick="setAddDays(30)" class="btn-ghost">+30 dias</button>
        <button type="button" onclick="setAddDays(90)" class="btn-ghost">+90 dias</button>
        <button type="button" onclick="setAddDays(0)"  class="btn-ghost"
                style="border-color:#C9A84C; color:#C9A84C;">Vitalício</button>
      </div>
      <input type="number" id="f-add-days" value="30" min="0" class="input-field" style="margin-bottom:4px;" />
      <p id="add-days-hint" style="font-size:11px; color:#555; margin-bottom:12px;"></p>
      <input type="hidden" id="days-shop-id" />
      <div style="display:flex; gap:10px;">
        <button onclick="confirmAddDays()" class="btn-gold" style="flex:1; justify-content:center;">Confirmar</button>
        <button onclick="closeDaysModal()" class="btn-ghost" style="padding:10px 20px;">Cancelar</button>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = window.API_URL || 'https://barberflow-api-0o7n.onrender.com';
    const token = localStorage.getItem('token');
    if (!token) window.location.href = 'index.html';

    function logout() { localStorage.clear(); window.location.href = 'index.html'; }

    async function req(method, path, body) {
      const res = await fetch(API_BASE + path, {
        method,
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
        body: body ? JSON.stringify(body) : undefined,
      });
      if (res.status === 403) { alert('Acesso negado. Esta página é restrita ao administrador.'); logout(); }
      if (res.status === 204) return {};
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || 'Erro');
      return data;
    }

    async function load() {
      try {
        const shops = await req('GET', '/admin/barbershops');
        renderMetrics(shops);
        renderShops(shops);
      } catch(e) { document.getElementById('shops-list').innerHTML = `<div style="color:#f87171;text-align:center;padding:40px;">${e.message}</div>`; }
    }

    function renderMetrics(shops) {
      const active   = shops.filter(s => s.is_active && (s.days_left === null || s.days_left > 0)).length;
      const expiring = shops.filter(s => s.is_active && s.days_left !== null && s.days_left <= 7 && s.days_left > 0).length;
      const expired  = shops.filter(s => !s.is_active || (s.days_left !== null && s.days_left === 0)).length;
      document.getElementById('metrics').innerHTML = `
        <div style="background:#111;border:1px solid #1e1e1e;border-radius:12px;padding:16px;">
          <p style="font-size:11px;color:#555;text-transform:uppercase;letter-spacing:0.05em;margin:0 0 6px;">Ativos</p>
          <p style="font-size:28px;font-weight:500;color:#34d399;margin:0;">${active}</p>
        </div>
        <div style="background:#111;border:1px solid #1e1e1e;border-radius:12px;padding:16px;">
          <p style="font-size:11px;color:#555;text-transform:uppercase;letter-spacing:0.05em;margin:0 0 6px;">Vencendo em 7 dias</p>
          <p style="font-size:28px;font-weight:500;color:#fbbf24;margin:0;">${expiring}</p>
        </div>
        <div style="background:#111;border:1px solid #1e1e1e;border-radius:12px;padding:16px;">
          <p style="font-size:11px;color:#555;text-transform:uppercase;letter-spacing:0.05em;margin:0 0 6px;">Expirados / Suspensos</p>
          <p style="font-size:28px;font-weight:500;color:#f87171;margin:0;">${expired}</p>
        </div>`;
    }

    function renderShops(shops) {
      if (!shops.length) {
        document.getElementById('shops-list').innerHTML = `<div style="text-align:center;padding:60px;color:#555;">Nenhuma barbearia cadastrada</div>`;
        return;
      }
      document.getElementById('shops-list').innerHTML = shops.map(s => {
        const expired = s.days_left === 0;
        const expiring = s.days_left > 0 && s.days_left <= 7;
        const badgeCls = !s.is_active ? 'badge-inactive' : expired ? 'badge-expired' : 'badge-active';
        const badgeLabel = !s.is_active ? 'Suspenso' : expired ? 'Expirado' : 'Ativo';
        const daysColor = expired ? '#f87171' : expiring ? '#fbbf24' : '#34d399';
        const expiresFormatted = s.expires_at
          ? new Date(s.expires_at).toLocaleDateString('pt-BR')
          : 'Sem limite';

        return `
          <div class="shop-card" style="margin-bottom:12px;">
            <div style="display:flex; align-items:flex-start; justify-content:space-between; gap:12px; flex-wrap:wrap;">
              <div style="flex:1; min-width:200px;">
                <div style="display:flex; align-items:center; gap:10px; margin-bottom:6px;">
                  <span style="font-weight:600; color:#fff; font-size:15px;">${s.name}</span>
                  <span class="${badgeCls}">${badgeLabel}</span>
                </div>
                <p style="color:#555; font-size:12px; margin:0 0 8px;">/${s.slug} · ${s.owner_name || '—'} · ${s.owner_email || '—'}</p>
                <div style="display:flex; gap:16px; flex-wrap:wrap;">
                  <span style="font-size:12px; color:#666;">${s.appointments_count} agendamentos</span>
                  <span style="font-size:12px; color:#666;">${s.clients_count} clientes</span>
                  <span style="font-size:12px; color:${daysColor}; font-weight:500;">
                    ${s.days_left !== null ? s.days_left + ' dias restantes' : '—'} · expira ${expiresFormatted}
                  </span>
                </div>
              </div>
              <div style="display:flex; gap:8px; flex-wrap:wrap; align-items:center;">
                <button onclick="openDaysModal(${s.id}, '${s.name.replace(/'/g,"\\'")}' )" class="btn-ghost" style="font-size:12px;">+Dias</button>
                <button onclick="toggleActive(${s.id}, ${s.is_active})" class="btn-ghost" style="font-size:12px;">${s.is_active ? 'Suspender' : 'Reativar'}</button>
              </div>
            </div>
          </div>`;
      }).join('');
    }

    // ── Modal nova barbearia ──
    function openModal() {
      document.getElementById('modal-title').textContent = 'Nova Barbearia';
      document.getElementById('edit-id').value = '';
      document.getElementById('f-name').value = '';
      document.getElementById('f-slug').value = '';
      document.getElementById('f-owner-name').value = '';
      document.getElementById('f-owner-email').value = '';
      document.getElementById('f-owner-password').value = '';
      document.getElementById('f-access-days').value = '30';
      document.getElementById('owner-fields').style.display = 'block';
      document.getElementById('modal').classList.add('show');
    }

    function closeModal() { document.getElementById('modal').classList.remove('show'); }

    function setDays(n) {
      document.getElementById('f-access-days').value = n;
      ['d7','d30','d90','d0'].forEach(id => {
        const el = document.getElementById(id);
        if (!el) return;
        el.style.borderColor = '';
        el.style.color = '';
      });
      const map = {7:'d7', 30:'d30', 90:'d90', 0:'d0'};
      if (map[n] !== undefined) {
        document.getElementById(map[n]).style.borderColor = '#C9A84C';
        document.getElementById(map[n]).style.color = '#C9A84C';
      }
      const hint = document.getElementById('days-hint');
      if (hint) hint.textContent = n === 0 ? '✓ Acesso vitalício — sem data de expiração' : '';
    }

    async function saveShop() {
      const name     = document.getElementById('f-name').value.trim();
      const slug     = document.getElementById('f-slug').value.trim();
      const oName    = document.getElementById('f-owner-name').value.trim();
      const oEmail   = document.getElementById('f-owner-email').value.trim();
      const oPass    = document.getElementById('f-owner-password').value.trim();
      const days = parseInt(document.getElementById('f-access-days').value);
      const accessDays = isNaN(days) ? 30 : days;

      if (!name || !slug || !oName || !oEmail || !oPass) {
        showToast('Preencha todos os campos obrigatórios', 'error'); return;
      }

      try {
        await req('POST', '/admin/barbershops', {
          name, slug,
          owner_name: oName, owner_email: oEmail, owner_password: oPass,
          access_days: accessDays === 0 ? null : accessDays,
        });
        showToast('Barbearia criada!');
        closeModal();
        load();
      } catch(e) { showToast(e.message, 'error'); }
    }

    async function toggleActive(id, isActive) {
      const action = isActive ? 'Suspender' : 'Reativar';
      if (!confirm(action + ' esta barbearia?')) return;
      try {
        await req('PATCH', `/admin/barbershops/${id}`, { is_active: !isActive });
        showToast(isActive ? 'Barbearia suspensa' : 'Barbearia reativada');
        load();
      } catch(e) { showToast(e.message, 'error'); }
    }

    // ── Modal adicionar dias ──
    function openDaysModal(id, name) {
      document.getElementById('days-shop-id').value = id;
      document.getElementById('days-shop-name').textContent = name;
      document.getElementById('f-add-days').value = '30';
      document.getElementById('modal-days').classList.add('show');
    }

    function closeDaysModal() { document.getElementById('modal-days').classList.remove('show'); }
    function setAddDays(n) {
      document.getElementById('f-add-days').value = n;
      const hint = document.getElementById('add-days-hint');
      if (hint) hint.textContent = n === 0 ? '✓ Acesso vitalício — sem data de expiração' : '';
    }

    async function confirmAddDays() {
      const id   = document.getElementById('days-shop-id').value;
      const days = parseInt(document.getElementById('f-add-days').value);
      const isVitalicio = days === 0 || isNaN(days);
      try {
        await req('PATCH', `/admin/barbershops/${id}`, {
          access_days: isVitalicio ? null : days
        });
        showToast(isVitalicio ? 'Acesso vitalício definido!' : `+${days} dias adicionados!`);
        closeDaysModal();
        load();
      } catch(e) { showToast(e.message, 'error'); }
    }

    // ── Toast ──
    function showToast(msg, type = 'success') {
      const t = document.createElement('div');
      t.className = 'toast';
      t.style.background = type === 'error' ? '#ef4444' : '#C9A84C';
      t.style.color = type === 'error' ? '#fff' : '#0D0D0D';
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 300); }, 3000);
    }

    load();
  </script>
</body>
</html>
