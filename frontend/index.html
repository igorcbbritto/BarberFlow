<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BarberFlow — Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --gold: #C9A84C;
      --gold-light: #E8C97A;
      --dark: #0D0D0D;
      --dark-2: #141414;
      --dark-3: #1C1C1C;
      --dark-4: #252525;
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--dark); color: #e5e5e5; }
    .font-display { font-family: 'Bebas Neue', cursive; }
    .gold { color: var(--gold); }
    .bg-gold { background: var(--gold); }

    /* Fundo animado */
    .bg-pattern {
      background-image: repeating-linear-gradient(
        45deg,
        transparent,
        transparent 40px,
        rgba(201,168,76,0.03) 40px,
        rgba(201,168,76,0.03) 80px
      );
    }

    /* Linha dourada nos inputs ao focar */
    .input-field {
      background: var(--dark-4);
      border: 1px solid #333;
      color: #e5e5e5;
      transition: border-color 0.2s;
    }
    .input-field:focus {
      outline: none;
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(201,168,76,0.15);
    }
    .input-field::placeholder { color: #555; }

    .btn-gold {
      background: var(--gold);
      color: #0D0D0D;
      font-weight: 600;
      letter-spacing: 0.05em;
      transition: all 0.2s;
    }
    .btn-gold:hover { background: var(--gold-light); transform: translateY(-1px); }
    .btn-gold:active { transform: translateY(0); }

    .tab-active {
      color: var(--gold);
      border-bottom: 2px solid var(--gold);
    }
    .tab-inactive {
      color: #666;
      border-bottom: 2px solid transparent;
    }

    /* Animação de fade no painel */
    .panel { animation: fadeUp 0.4s ease; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Divisor com texto */
    .divider {
      display: flex; align-items: center; gap: 12px; color: #444;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: #2a2a2a;
    }
  </style>
</head>
<body class="min-h-screen bg-pattern flex items-center justify-center p-4">

  <!-- Fundo decorativo -->
  <div class="fixed inset-0 pointer-events-none overflow-hidden">
    <div class="absolute -top-40 -left-40 w-96 h-96 rounded-full opacity-5"
         style="background: radial-gradient(circle, #C9A84C, transparent)"></div>
    <div class="absolute -bottom-40 -right-40 w-96 h-96 rounded-full opacity-5"
         style="background: radial-gradient(circle, #C9A84C, transparent)"></div>
  </div>

  <div class="w-full max-w-md relative z-10">

    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center gap-3 mb-2">
        <!-- Ícone de tesoura estilizado em SVG -->
        <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
          <circle cx="18" cy="18" r="18" fill="#C9A84C" opacity="0.15"/>
          <path d="M10 10 L20 20 M26 10 L16 20 M14 22 a4 4 0 1 0 4 4 M22 22 a4 4 0 1 0 4 4"
                stroke="#C9A84C" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
        <h1 class="font-display text-5xl tracking-widest gold">BARBERFLOW</h1>
      </div>
      <p class="text-sm text-gray-500 tracking-widest uppercase">Sistema de Gestão para Barbearias</p>
    </div>

    <!-- Card principal -->
    <div class="panel rounded-2xl overflow-hidden shadow-2xl" style="background: var(--dark-2); border: 1px solid #222;">

      <!-- Tabs Login / Cadastro -->
      <div class="flex border-b" style="border-color: #222;">
        <button id="tab-login"
                onclick="switchTab('login')"
                class="flex-1 py-4 text-sm font-medium tracking-wide tab-active transition-all">
          Entrar
        </button>
        <button id="tab-register"
                onclick="switchTab('register')"
                class="flex-1 py-4 text-sm font-medium tracking-wide tab-inactive transition-all">
          Criar Conta
        </button>
      </div>

      <div class="p-8">

        <!-- ── FORMULÁRIO DE LOGIN ── -->
        <form id="form-login" onsubmit="handleLogin(event)" class="space-y-4">
          <div>
            <label class="block text-xs text-gray-400 mb-1.5 tracking-wide uppercase">E-mail</label>
            <input type="email" id="login-email" required
                   placeholder="seu@email.com"
                   class="input-field w-full px-4 py-3 rounded-lg text-sm" />
          </div>
          <div>
            <label class="block text-xs text-gray-400 mb-1.5 tracking-wide uppercase">Senha</label>
            <input type="password" id="login-password" required
                   placeholder="••••••••"
                   class="input-field w-full px-4 py-3 rounded-lg text-sm" />
          </div>
          <button type="submit" id="btn-login"
                  class="btn-gold w-full py-3 rounded-lg text-sm uppercase tracking-widest mt-2">
            Entrar
          </button>

          <div class="divider text-xs">Demo</div>

          <button type="button"
                  onclick="fillDemo()"
                  class="w-full py-2.5 rounded-lg text-xs text-gray-400 border border-dashed tracking-wide"
                  style="border-color: #333;">
            Preencher com dados de demonstração
          </button>
        </form>

        <!-- ── CADASTRO FECHADO ── -->
        <div id="form-register" class="hidden">
          <div class="text-center py-4">
            <div class="w-14 h-14 rounded-full flex items-center justify-center mx-auto mb-4"
                 style="background: rgba(201,168,76,0.1);">
              <svg class="w-7 h-7" style="color:#C9A84C;" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                      d="M12 15v2m0 0v2m0-2h2m-2 0H10m2-5a5 5 0 100-10 5 5 0 000 10z"/>
              </svg>
            </div>
            <h3 class="font-semibold text-white text-base mb-2">Cadastros fechados</h3>
            <p class="text-gray-500 text-sm leading-relaxed mb-6">
              O BarberFlow está em acesso controlado.<br>
              Entre em contato para contratar seu acesso.
            </p>

            <a href="https://wa.me/5521999999999?text=Olá!%20Quero%20contratar%20o%20BarberFlow%20para%20minha%20barbearia."
               target="_blank"
               class="btn-gold w-full py-3 rounded-lg text-sm uppercase tracking-widest flex items-center justify-center gap-2 no-underline mb-3"
               style="text-decoration:none;">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/>
                <path d="M12 0C5.373 0 0 5.373 0 12c0 2.134.558 4.133 1.535 5.865L.057 23.57a.75.75 0 00.918.919l5.815-1.479A11.947 11.947 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.75a9.71 9.71 0 01-4.997-1.378l-.36-.214-3.716.945.975-3.63-.235-.374A9.712 9.712 0 012.25 12C2.25 6.615 6.615 2.25 12 2.25S21.75 6.615 21.75 12 17.385 21.75 12 21.75z"/>
              </svg>
              Falar no WhatsApp
            </a>

            <p class="text-xs text-gray-600">
              Ou envie um e-mail para
              <a href="mailto:contato@barberflow.com" class="gold" style="text-decoration:none;">contato@barberflow.com</a>
            </p>
          </div>
        </div>

      </div>
    </div>

    <p class="text-center text-xs text-gray-600 mt-6">
      BarberFlow © 2024 — Gestão inteligente para barbearias
    </p>
  </div>

  <script src="js/api.js"></script>
  <script>
    // Redireciona se já estiver logado
    if (Auth.isLoggedIn()) {
      window.location.href = Auth.isAdmin() ? 'admin.html' : 'pages/dashboard.html';
    }

    function switchTab(tab) {
      const isLogin = tab === 'login';
      document.getElementById('form-login').classList.toggle('hidden', !isLogin);
      document.getElementById('form-register').classList.toggle('hidden', isLogin);
      document.getElementById('tab-login').className    = `flex-1 py-4 text-sm font-medium tracking-wide transition-all ${isLogin ? 'tab-active' : 'tab-inactive'}`;
      document.getElementById('tab-register').className = `flex-1 py-4 text-sm font-medium tracking-wide transition-all ${!isLogin ? 'tab-active' : 'tab-inactive'}`;
    }

    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('btn-login');
      btn.textContent = 'Entrando...'; btn.disabled = true;
      try {
        const data = await API.login({
          email:    document.getElementById('login-email').value,
          password: document.getElementById('login-password').value,
        });
        Auth.save(data);
        window.location.href = data.is_admin ? 'admin.html' : 'pages/dashboard.html';
      } catch (err) {
        showToast(err.message, 'error');
      } finally {
        btn.textContent = 'Entrar'; btn.disabled = false;
      }
    }

    async function handleRegister(e) {
      e.preventDefault();
      const btn = document.getElementById('btn-register');
      btn.textContent = 'Criando conta...'; btn.disabled = true;
      try {
        const data = await API.register({
          barbershop_name: document.getElementById('reg-barbershop').value,
          barbershop_slug: document.getElementById('reg-slug').value,
          user_name:       document.getElementById('reg-name').value,
          email:           document.getElementById('reg-email').value,
          password:        document.getElementById('reg-password').value,
        });
        Auth.save(data);
        window.location.href = 'pages/dashboard.html';
      } catch (err) {
        showToast(err.message, 'error');
      } finally {
        btn.textContent = 'Criar Conta Grátis'; btn.disabled = false;
      }
    }

    function fillDemo() {
      document.getElementById('login-email').value    = 'demo@barberflow.com';
      document.getElementById('login-password').value = 'demo123';
    }
  </script>
</body>
</html>
